# Log4j configuration for Vega
# Console + rolling file appender

log4j.rootLogger=INFO, console, file

# Console appender
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{HH:mm:ss.SSS} [%t] %-5p %c{1} - %m%n

# Rolling file appender
log4j.appender.file=org.apache.log4j.DailyRollingFileAppender
log4j.appender.file.File=vega.log
log4j.appender.file.DatePattern='.'yyyy-MM-dd
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c - %m%n

# Component log levels
log4j.logger.io.undo.test.vega.bus=INFO
log4j.logger.io.undo.test.vega.feed=INFO
log4j.logger.io.undo.test.vega.engine=INFO
log4j.logger.io.undo.test.vega.server=INFO
log4j.logger.io.undo.test.vega.protocol=DEBUG
